<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2744;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0f1b33;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chartLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:0.3" />
    </linearGradient>
    <linearGradient id="candleGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="candleRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f87171;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="areaFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.02" />
    </linearGradient>
    <filter id="lineGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" />
    </filter>
    <clipPath id="iconClip">
      <rect x="20" y="20" width="984" height="984" rx="220" ry="220" />
    </clipPath>
  </defs>

  <!-- Background rounded square -->
  <rect x="20" y="20" width="984" height="984" rx="220" ry="220" fill="url(#bg)" />

  <!-- Subtle grid lines -->
  <g clip-path="url(#iconClip)" opacity="0.06" stroke="#ffffff" stroke-width="1">
    <line x1="200" y1="300" x2="824" y2="300" />
    <line x1="200" y1="430" x2="824" y2="430" />
    <line x1="200" y1="560" x2="824" y2="560" />
    <line x1="200" y1="690" x2="824" y2="690" />
  </g>

  <!-- Candlestick bars -->
  <g clip-path="url(#iconClip)">
    <!-- Candle 1 - red (down) -->
    <line x1="260" y1="545" x2="260" y2="665" stroke="#ef4444" stroke-width="3" opacity="0.5" />
    <rect x="245" y="570" width="30" height="60" rx="3" fill="url(#candleRed)" opacity="0.6" />

    <!-- Candle 2 - green (up) -->
    <line x1="340" y1="500" x2="340" y2="640" stroke="#10b981" stroke-width="3" opacity="0.5" />
    <rect x="325" y="520" width="30" height="80" rx="3" fill="url(#candleGreen)" opacity="0.6" />

    <!-- Candle 3 - red (down) -->
    <line x1="420" y1="480" x2="420" y2="610" stroke="#ef4444" stroke-width="3" opacity="0.5" />
    <rect x="405" y="500" width="30" height="70" rx="3" fill="url(#candleRed)" opacity="0.6" />

    <!-- Candle 4 - green (up) -->
    <line x1="500" y1="420" x2="500" y2="570" stroke="#10b981" stroke-width="3" opacity="0.5" />
    <rect x="485" y="440" width="30" height="85" rx="3" fill="url(#candleGreen)" opacity="0.6" />

    <!-- Candle 5 - green (up) -->
    <line x1="580" y1="370" x2="580" y2="510" stroke="#10b981" stroke-width="3" opacity="0.5" />
    <rect x="565" y="385" width="30" height="80" rx="3" fill="url(#candleGreen)" opacity="0.6" />

    <!-- Candle 6 - red (small dip) -->
    <line x1="660" y1="350" x2="660" y2="460" stroke="#ef4444" stroke-width="3" opacity="0.5" />
    <rect x="645" y="370" width="30" height="55" rx="3" fill="url(#candleRed)" opacity="0.6" />

    <!-- Candle 7 - green (strong up) -->
    <line x1="740" y1="280" x2="740" y2="420" stroke="#10b981" stroke-width="3" opacity="0.5" />
    <rect x="725" y="295" width="30" height="80" rx="3" fill="url(#candleGreen)" opacity="0.6" />
  </g>

  <!-- Area fill under the chart line -->
  <path d="M 200 620 L 260 590 L 340 530 L 420 510 L 500 450 L 580 395 L 660 380 L 740 310 L 800 290 L 800 750 L 200 750 Z"
        fill="url(#areaFill)" clip-path="url(#iconClip)" />

  <!-- Glow effect behind chart line -->
  <path d="M 200 620 L 260 590 L 340 530 L 420 510 L 500 450 L 580 395 L 660 380 L 740 310 L 800 290"
        stroke="url(#glow)" stroke-width="20" fill="none" stroke-linecap="round" stroke-linejoin="round"
        filter="url(#softGlow)" clip-path="url(#iconClip)" />

  <!-- Main chart line -->
  <path d="M 200 620 L 260 590 L 340 530 L 420 510 L 500 450 L 580 395 L 660 380 L 740 310 L 800 290"
        stroke="url(#chartLine)" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"
        filter="url(#lineGlow)" clip-path="url(#iconClip)" />

  <!-- Endpoint dot with glow -->
  <circle cx="800" cy="290" r="16" fill="#10b981" opacity="0.2" filter="url(#softGlow)" />
  <circle cx="800" cy="290" r="10" fill="#34d399" />
  <circle cx="800" cy="290" r="5" fill="#ffffff" opacity="0.8" />

  <!-- Small upward arrow at the end -->
  <g transform="translate(800, 240)" opacity="0.9">
    <polygon points="0,-20 12,0 4,0 4,16 -4,16 -4,0 -12,0" fill="#34d399" />
  </g>
</svg>
